name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Update version in manifest
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          jq ".version = \"$VERSION\"" manifest.json > manifest.tmp.json && mv manifest.tmp.json manifest.json

      - name: Create Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Create release as draft (notes can be added manually)
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --target main \
            main.js \
            styles.css \
            manifest.json
